# Pulse-TUI configuration

[mqtt]
host     = "localhost"
port     = 1883
username = ""
version  = "v311"       # "v311" = MQTT 3.1.1  |  "v5" = MQTT 5.0
topics   = []           # e.g. ["sensors/#", "plc/status"]

[modbus]
host    = "localhost"
port    = 502
unit_id = 1
poll_interval_ms = 1000

[opcua]
endpoint_url = "opc.tcp://localhost:4840"
node_ids = []
poll_interval_ms = 1000

[serial]
port      = "/dev/ttyUSB0"
baud_rate = 9600
